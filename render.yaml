services:
  - type: web
    name: finance-tutor-api
    runtime: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: "15"
      - key: JWT_REFRESH_EXPIRATION_DAYS
        value: "7"
      - key: PASSWORD_RESET_EXPIRATION_MINUTES
        value: "30"
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    autoDeploy: true
